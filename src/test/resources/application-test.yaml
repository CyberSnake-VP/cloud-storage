
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # hibernate будет создавать таблицы
  liquibase:
    enabled: false

  # Отключаем автоконфигурацию Redis полностью, чтобы Redis не участвовал в текстах
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

logging:
  level:
    org.cloudstorage: DEBUG

# Отключаем работу minIO
storage:
  init:
    enabled: false