databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: CyberSnake-VP
      comment: "Создание таблицы users для хранения пользователей системы"
      changes:
        - createTable:
            tableName: users
            remarks: "Таблица пользователей"
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false
                  remarks: "Уникальный идентификатор пользователя"
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uk_users_username
                  remarks: "Логин пользователя (уникальный)"
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                  remarks: "Пароль пользователей, храним BCrypt хеш"

  - changeSet:
      id: 001-create-index-username
      author: CyberSnake-VP
      comment: "Индекс для ускорения поиска пользователя по username"

      changes:
        - createIndex:
            tableName: users
            indexName: idx_users_username
            columns:
              - column:
                  name: username



