server:
  port: 8080

spring:
  application:
    name: cloud-storage

  datasource:
    url: ${URL:jdbc:postgresql://localhost:5432/${POSTGRES_DB:cloud_storage_db}}
    username: ${POSTGRES_USERNAME:cloud_user}
    password: ${POSTGRES_PASSWORD:cloud_pass}
    driver-class-name: org.postgresql.Driver

  # validate, только проверка схемы бд, без изменений
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  # включаем миграции
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/changelog-master.yaml





logging:
  level:
    org.cloudstorage: INFO
