server:
  port: 8080

spring:
  application:
    name: cloud-storage

  datasource:
    url: ${URL:jdbc:postgresql://localhost:5432/cloud_storage_db}
    username: ${POSTGRES_USERNAME:cloud_user}
    password: ${POSTGRES_PASSWORD:cloud_pass}
